name: CI/CD Pipeline - Deploy to AWS

on:
  push:
    branches:
      - main  # Jab bhi aap push karenge, automation shuru ho jayegi

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. GitHub se code uthana
      - name: Checkout Code
        uses: actions/checkout@v3

      # 2. Docker Hub par login karna
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 3. Image Build aur Docker Hub par Push karna
      - name: Build and Push Docker Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/php-app:latest .
          docker push ${{ secrets.DOCKER_USERNAME }}/php-app:latest

      # 4. AWS EC2 par SSH ke zariye deploy karna
      - name: SSH to EC2 and Deploy
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Docker Hub se latest image pull karein
            docker pull ${{ secrets.DOCKER_USERNAME }}/php-app:latest
            
            # Purana container stop aur remove karein (agar chal raha ho)
            docker stop php-frontend || true
            docker rm php-frontend || true
            
            # Naya container run karein
            # Note: Maan ke chal raha hoon 'mynetwork' pehle se bana hua hai
            docker run -d \
              --name php-frontend \
              -p 80:80 \
              --network mynetwork \
              ${{ secrets.DOCKER_USERNAME }}/php-app:latest

            # Cleanup: Purani be-kar images delete karna
            docker image prune -f
