<!DOCTYPE html>
<html>
<head>

<title>DevOps Login</title>

<style>

body{
margin:0;
font-family:Arial;
background:#07182e;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
color:white;
}

.login-box{
background:#0d253f;
padding:40px;
border-radius:12px;
width:350px;
box-shadow:0 0 20px rgba(0,255,255,0.2);
}

h2{
text-align:center;
margin-bottom:25px;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:6px;
}

button{
width:100%;
padding:12px;
background:#00d9ff;
border:none;
border-radius:6px;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#00a7c2;
}

.register-link{
text-align:center;
margin-top:15px;
}

.register-link a{
color:#00d9ff;
text-decoration:none;
}

</style>

</head>

<body>

<div class="login-box">

<h2>DevOps Portal Login</h2>

<form action="authenticate.php" method="POST">

<input type="text" name="username" placeholder="Username" required>

<input type="password" name="password" placeholder="Password" required>

<button type="submit">Login</button>

</form>

<div class="register-link">
New user? <a href="register.html">Register here</a>
</div>

</div>

</body>
</html>
